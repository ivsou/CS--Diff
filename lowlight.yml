data:
    dataset: "lowlight"
    image_size: 256
    channels: 3
    num_workers: 2
    data_dir: "./datasets/scratch/LLIE"
    conditional: True

model:
    in_channels: 3
    out_ch: 3
    ch: 128
    ch_mult: [1, 2, 4, 8]
    num_res_blocks: 2
    attn_resolutions: []
    dropout: 0.0
    ema_rate: 0.999
    ema: True
    resamp_with_conv: True

diffusion:
    beta_schedule: linear
    beta_start: 0.0001
    beta_end: 0.02
    num_diffusion_timesteps: 1000

training:
    patch_n: 1
    batch_size: 16
    gradient_accumulation_steps: 2
    n_epochs: 200000
    n_iters: 200000
    snapshot_freq: 10000
    validation_freq: 200
    save_metrics: True
    early_stopping: True
    patience: 5000
    log_path: "./checkpoints"
    val_split: 0.3
    keep_checkpoints: 3
    save_best_only: True
    save_init_checkpoint: False
    recon_loss_weight: 0.1
    lpips_loss_weight: 0.2
    ssim_loss_weight: 0.2
    finetune_lr: 0.000005
    use_amp: True
    oom_splits: 2
    validation_batches: null
    validation_max_samples_per_batch: null
    validation_save_images: 3

sampling:
    batch_size: 1
    last_only: True

optim:
    weight_decay: 0.0001
    optimizer: Adam
    lr: 0.00002
    betas: [0.9, 0.999]
    lr_schedule: cosine
    warmup_steps: 1000
    amsgrad: True
    eps: 0.00000001
    grad_clip: 0.5

# GPU
gpu_ids: [0]

# TensorBoard
tensorboard:
    log_dir: "./tensorboard_logs_v3"
    update_freq: 10

evaluation:
    save_psnr: True
    save_ssim: True
    save_lpips: True
    metrics_dir: "./metrics"

# DarkIR
darkir_enhancement:
    enable_spatial_attention: True
    enable_freq_mlp: True
    enable_multiscale_attention: True
    enable_gated_ffn: True
    dilations: [1, 4, 9]
    freq_expand_ratio: 2
    spatial_expand_ratio: 2
    enable_phase_processing: True
